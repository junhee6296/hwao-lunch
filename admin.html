<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QR 스캐너 : 화성오산교육청</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">
  
  <div id="auth-overlay" class="fixed inset-0 bg-gray-900 z-[100] flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
      <div class="text-4xl mb-4">🛡️</div>
      <h2 class="text-xl font-black mb-2">스캐너 보안 인증</h2>
      <p class="text-gray-500 text-sm mb-6">최고 관리자 권한 확인을 위해<br>이메일 인증을 진행해 주세요.</p>
      
      <div class="mb-4 text-left">
        <label class="block text-xs font-bold text-gray-500 mb-1">관리자 이메일</label>
        <input type="email" id="admin-email" class="w-full border p-3 rounded-xl outline-none focus:border-green-500" placeholder="admin@email.com">
      </div>

      <button id="btn-request-auth" class="w-full py-3 bg-green-600 hover:bg-green-700 transition text-white rounded-xl font-bold mb-3">인증번호 발송</button>
      
      <div id="auth-input-group" class="hidden">
        <input type="text" id="2fa-code" class="w-full border-2 border-gray-100 p-3 rounded-xl text-center text-2xl tracking-widest mb-3 focus:border-green-500 outline-none" placeholder="000000" maxlength="6">
        <button id="btn-verify-auth" class="w-full py-3 bg-gray-800 hover:bg-black transition text-white rounded-xl font-bold">인증 확인</button>
      </div>
      <a href="/" class="block mt-4 text-sm text-gray-400 underline">QR 발급 화면으로 가기</a>
    </div>
  </div>

  <div id="main-content" class="hidden flex-1 flex-col w-full">
    <header class="bg-white shadow-sm p-4 flex justify-between items-center z-10">
      <h1 class="text-xl font-black text-gray-800">📷 점심체크 스캐너</h1>
      <div class="flex gap-2">
        <a href="/admin_list.html" class="bg-gray-800 text-white text-xs font-bold py-2 px-3 rounded-lg shadow">👥 명단 관리</a>
        <a href="/" class="bg-green-600 text-white text-xs font-bold py-2 px-3 rounded-lg shadow">📱 발급 화면</a>
      </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4">
      <div class="relative w-full max-w-sm bg-black rounded-3xl overflow-hidden shadow-2xl aspect-square mb-6">
        <video id="qr-video" class="w-full h-full object-cover" playsinline></video>
        <canvas id="qr-canvas" class="hidden"></canvas>
        
        <div class="absolute inset-0 border-[12px] border-black/30 pointer-events-none"></div>
        <div class="absolute top-1/2 left-0 w-full h-1 bg-green-500/50 shadow-[0_0_15px_green] animate-pulse"></div>
      </div>

      <button id="btn-flip-camera" class="mb-8 flex items-center gap-2 bg-white border-2 border-gray-200 text-gray-700 px-6 py-3 rounded-2xl font-bold shadow-sm active:scale-95 transition-transform">
        <span class="text-xl">🔄</span> 카메라 방향 전환
      </button>

      <div id="scan-result" class="w-full max-w-sm bg-white p-6 rounded-3xl shadow-lg text-center hidden">
        <div id="result-icon" class="text-6xl mb-2">✅</div>
        <h2 id="result-name" class="text-2xl font-black text-gray-900 mb-1"></h2>
        <p id="result-dept" class="text-gray-500 text-sm font-bold mb-4"></p>
        <p id="result-msg" class="text-lg font-bold text-green-600"></p>
      </div>
    </main>
  </div>

  <script type="module">
    import { API_BASE_URL } from './JS/config.js';

    // ==========================================
    // 🔐 2차 보안 인증 로직
    // ==========================================
    if (sessionStorage.getItem('adminAuthVerified') === 'true') {
      document.getElementById('auth-overlay').classList.add('hidden');
      const mainContent = document.getElementById('main-content');
      mainContent.classList.remove('hidden');
      mainContent.classList.add('flex');
      startCamera(); // 인증된 경우에만 카메라 즉시 시작
    }

    document.getElementById('btn-request-auth').onclick = async () => {
      const email = document.getElementById('admin-email').value.trim();
      if (!email) return alert('이메일을 입력하세요.');
      
      const res = await fetch(`${API_BASE_URL}/admin/request-code`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email })
      });
      
      if (res.ok) {
        document.getElementById('btn-request-auth').classList.add('hidden');
        document.getElementById('auth-input-group').classList.remove('hidden');
        document.getElementById('admin-email').disabled = true;
        alert('인증번호가 발송되었습니다.');
      } else {
        const data = await res.json();
        alert(data.message);
      }
    };

    document.getElementById('btn-verify-auth').onclick = async () => {
      const email = document.getElementById('admin-email').value;
      const code = document.getElementById('2fa-code').value;
      
      const res = await fetch(`${API_BASE_URL}/admin/verify-code`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, code })
      });
      
      if (res.ok) {
        sessionStorage.setItem('adminAuthVerified', 'true');
        document.getElementById('auth-overlay').classList.add('hidden');
        const mainContent = document.getElementById('main-content');
        mainContent.classList.remove('hidden');
        mainContent.classList.add('flex');
        startCamera(); // 인증 성공 시 카메라 시작
      } else {
        alert('인증번호가 일치하지 않습니다.');
      }
    };

    // ==========================================
    // 📷 카메라 및 QR 스캔 로직 (기존 로직 유지)
    // ==========================================
    const video = document.getElementById('qr-video');
    const canvasElement = document.getElementById('qr-canvas');
    const canvas = canvasElement.getContext('2d', { willReadFrequently: true });
    
    let currentFacingMode = 'environment';
    let scanning = true;

    async function startCamera() {
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacingMode, width: { ideal: 720 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        requestAnimationFrame(tick);

        video.style.transform = currentFacingMode === 'user' ? "scaleX(-1)" : "scaleX(1)";
        
      } catch (err) {
        alert("카메라에 접근할 수 없거나 반전 카메라가 없는 기기입니다.");
        if(currentFacingMode === 'user') {
          currentFacingMode = 'environment';
          startCamera();
        }
      }
    }

    document.getElementById('btn-flip-camera').onclick = () => {
      currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
      startCamera();
    };

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
        canvasElement.height = video.videoHeight;
        canvasElement.width = video.videoWidth;

        // 전면 카메라일 경우 캔버스(QR 인식 데이터) 좌우 반전
        if (currentFacingMode === 'user') {
          canvas.translate(canvasElement.width, 0);
          canvas.scale(-1, 1);
        }

        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);

        if (currentFacingMode === 'user') {
          canvas.setTransform(1, 0, 0, 1, 0, 0);
        }

        const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

        if (code) {
          scanning = false;
          handleScan(code.data);
        }
      }
      if (scanning) requestAnimationFrame(tick);
    }

    async function handleScan(qrToken) {
      const resultDiv = document.getElementById('scan-result');
      const icon = document.getElementById('result-icon');
      const nameEl = document.getElementById('result-name');
      const deptEl = document.getElementById('result-dept');
      const msgEl = document.getElementById('result-msg');

      try {
        const res = await fetch(`${API_BASE_URL}/qr/scan`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qrToken })
        });
        const data = await res.json();

        resultDiv.classList.remove('hidden');
        if (res.ok) {
          icon.textContent = "🍱";
          nameEl.textContent = `${data.name} 님`;
          deptEl.textContent = data.orgRole;
          msgEl.textContent = "식사 처리가 완료되었습니다!";
          msgEl.className = "text-lg font-bold text-green-600";
        } else {
          icon.textContent = "❌";
          nameEl.textContent = "승인 거부";
          deptEl.textContent = "";
          msgEl.textContent = data.message;
          msgEl.className = "text-lg font-bold text-red-500";
        }
      } catch (e) {
        alert("서버 연결에 실패했습니다.");
      }

      setTimeout(() => {
        resultDiv.classList.add('hidden');
        scanning = true;
        requestAnimationFrame(tick);
      }, 2000);
    }
  </script>
</body>
</html>
