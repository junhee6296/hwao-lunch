<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>점심 식사자 관리 : 화성오산교육청</title>
  
  <script>
    const originalWarn = console.warn;
    console.warn = (...args) => {
      if (typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
      originalWarn(...args);
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <link rel="stylesheet" href="CSS/style.css">
  
  <style>
    /* html5-qrcode 디자인 덮어쓰기 */
    #reader { width: 100% !important; height: 100% !important; border: none !important; background: black; }
    #reader__scan_region { width: 100% !important; height: 100% !important; }
    #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; transition: transform 0.3s ease; }
  </style>
</head>
<body class="bg-gray-100">
  
  <div id="login-section" class="min-h-screen flex items-center justify-center bg-gray-900 p-4 relative z-[100]">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
      <div class="text-4xl mb-4">📷</div>
      <h2 class="text-xl font-black mb-2">스캐너 보안 로그인</h2>
      <p class="text-gray-500 text-sm mb-6">스캐너 작동을 위해<br>일반 관리자 인증을 진행해 주세요.</p>
      
      <div id="step-email" class="mb-4 text-left">
        <label class="block text-xs font-bold text-gray-500 mb-1">관리자 이메일</label>
        <input type="email" id="adminEmail" class="w-full border p-3 rounded-xl outline-none focus:border-green-500" placeholder="admin@email.com">
        <button id="btn-request-code" class="w-full py-3 mt-4 bg-green-600 hover:bg-green-700 transition text-white rounded-xl font-bold">인증번호 요청</button>
      </div>

      <div id="step-code" class="hidden text-left mt-2">
        <input type="text" id="adminCode" class="w-full border-2 border-gray-100 p-3 rounded-xl text-center text-2xl tracking-widest mb-3 focus:border-green-500 outline-none" placeholder="000000" maxlength="6">
        <button id="btn-verify-code" class="w-full py-3 bg-gray-800 hover:bg-black transition text-white rounded-xl font-bold">인증 확인 및 시작</button>
      </div>
    </div>
  </div>

  <div id="admin-dashboard" class="hidden min-h-screen lg:h-screen flex flex-col bg-gray-100">
    <header class="bg-white border-b-2 border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm relative shrink-0">
      <div class="flex items-center gap-4">
        <h1 class="text-3xl font-black text-gray-900">🍽️ 점심 식사자 관리</h1>
        <div class="flex items-center bg-blue-50 px-4 py-2 rounded-xl border border-blue-100">
          <label class="font-bold text-blue-700 mr-2">조회 날짜:</label>
          <input type="date" id="date-selector" class="bg-transparent font-bold text-blue-800 outline-none">
        </div>
      </div>
      <div class="flex gap-2 items-center">
        <a href="/qr.html" class="mr-4 text-gray-500 hover:text-green-600 font-bold flex items-center gap-1 transition-colors">📱 QR 발급화면</a>
        <a href="/admin_list.html" class="bg-gray-800 hover:bg-black text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md">👥 명단 관리하기</a>
        <button id="btn-export-monthly" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md">📅 월별 시트</button>
        <button id="btn-export-daily" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md">📥 일별 시트</button>
      </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row gap-4 lg:gap-6 p-4 lg:p-6 min-h-0 overflow-auto lg:overflow-hidden">
      <section class="flex-1 flex flex-col gap-4 min-h-[600px] lg:min-h-0">
        
        <div class="bg-black rounded-3xl shadow-lg border border-gray-200 flex-1 relative overflow-hidden flex items-center justify-center">
          
          <div id="reader" class="w-full h-full"></div>
          
          <div id="scan-result-panel" class="absolute bottom-6 left-1/2 -translate-x-1/2 w-11/12 max-w-md p-4 text-center rounded-2xl bg-white/95 backdrop-blur shadow-2xl z-50 transition-all border-4 border-transparent">
             <p id="scan-msg" class="text-xl lg:text-2xl font-bold text-gray-700">QR 코드를 보여주세요</p>
             <p id="scan-sub-msg" class="text-sm text-gray-500 mt-1">인식 시 자동으로 식사 명단에 등록됩니다</p>
          </div>
        </div>
        
        <div class="grid grid-cols-2 gap-4 shrink-0">
          <div class="bg-white p-5 lg:p-6 rounded-2xl shadow-md border-b-4 border-green-500">
            <p class="text-gray-500 font-bold">오늘 현재 식수</p>
            <h3 id="stat-count" class="text-4xl lg:text-5xl font-black text-gray-900 mt-2">0명</h3>
          </div>
          <div class="bg-white p-5 lg:p-6 rounded-2xl shadow-md border-b-4 border-blue-500">
            <p class="text-gray-500 font-bold">최근 식사자</p>
            <h3 id="recent-diner" class="text-xl lg:text-2xl font-bold text-blue-600 mt-2 truncate">-</h3>
          </div>
        </div>
      </section>

      <aside class="w-full lg:w-1/3 bg-white rounded-3xl shadow-lg border border-gray-200 flex flex-col shrink-0 lg:shrink overflow-hidden h-[500px] lg:h-auto">
        <div class="p-5 lg:p-6 border-b border-gray-100 bg-gray-50 shrink-0">
          <h2 class="text-2xl font-black text-gray-800">📋 실시간 식사 명단</h2>
        </div>
        <div class="flex-1 overflow-y-auto">
          <table class="w-full text-left">
            <thead class="bg-gray-50 sticky top-0">
              <tr>
                <th class="p-4 font-bold text-gray-600 border-b">부서</th>
                <th class="p-4 font-bold text-gray-600 border-b">이름</th>
                <th class="p-4 font-bold text-gray-600 border-b text-center">시간</th>
              </tr>
            </thead>
            <tbody id="diner-table-body" class="divide-y divide-gray-100"></tbody>
          </table>
        </div>
      </aside>
    </main>
  </div>

  <script type="module" src="JS/admin_app.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
      const flipBtn = document.getElementById('custom-flip-btn');
      let isFlipped = false;

      flipBtn.addEventListener('click', async () => {
        // 1. 전/후면 모드 토글
        isFlipped = !isFlipped;
        const newFacingMode = isFlipped ? "user" : "environment";

        // 2. 현재 실행 중인 스캐너 인스턴스 확인 (admin_app.js에서 생성한 객체 찾기)
        // 보통 라이브러리는 내부적으로 비디오 스트림을 관리하므로 스트림을 껐다 켜야 함
        if (window.html5QrCode && window.html5QrCode.isScanning) {
          try {
            await window.html5QrCode.stop(); // 현재 카메라 중지
            
            // 3. admin_app.js에 정의된 시작 함수를 새 방향으로 호출
            // (함수명이 다를 경우 해당 파일의 시작 함수명으로 변경 필요)
            if (typeof window.startScanner === 'function') {
              window.startScanner(newFacingMode);
            } else {
              // 함수가 글로벌로 노출되지 않은 경우 페이지 새로고침 없이 강제 재시작 시도
              location.reload(); 
              return;
            }
          } catch (err) {
            console.error("카메라 전환 실패:", err);
          }
        }

        // 4. 시각적 거울 모드 보정 (인식률 저하 방지용)
        // CSS 반전은 '화면'만 반전시키고, 라이브러리가 읽는 '이미지 데이터'는 원본을 유지함
        setTimeout(() => {
          const videoElement = document.querySelector('#reader video');
          if (videoElement) {
            videoElement.style.transform = isFlipped ? 'scaleX(-1)' : 'scaleX(1)';
          }
        }, 500); // 카메라 리로딩 대기

        // 5. 버튼 UI 업데이트
        flipBtn.innerHTML = isFlipped ? "🔄 후면 카메라 전환" : "🔄 전면 카메라 전환";
        flipBtn.className = isFlipped 
          ? "absolute top-4 left-4 z-[60] bg-blue-600 text-white px-3 py-2 rounded-xl shadow-md text-sm font-bold flex items-center gap-1 active:scale-95 transition-transform"
          : "absolute top-4 left-4 z-[60] bg-white/90 text-gray-800 px-3 py-2 rounded-xl shadow-md text-sm font-bold flex items-center gap-1 backdrop-blur active:scale-95 transition-transform hover:bg-gray-100";
      });
    });
  </script>

</body>
</html>
