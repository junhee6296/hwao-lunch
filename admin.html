<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QR 스캐너 : 화성오산교육청</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    /* html5-qrcode 디자인 덮어쓰기 */
    #reader { width: 100% !important; height: 100% !important; border: none !important; background: black; }
    #reader__scan_region { width: 100% !important; height: 100% !important; }
    #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; transition: transform 0.3s ease; }
  </style>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">
  
  <div id="auth-overlay" class="fixed inset-0 bg-gray-900 z-[100] flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
      <div class="text-4xl mb-4">🛡️</div>
      <h2 class="text-xl font-black mb-2">스캐너 보안 인증</h2>
      <p class="text-gray-500 text-sm mb-6">최고 관리자가 지정한 일반 관리자만<br>스캐너를 작동시킬 수 있습니다.</p>
      
      <div class="mb-4 text-left">
        <label class="block text-xs font-bold text-gray-500 mb-1">관리자 이메일</label>
        <input type="email" id="admin-email" class="w-full border p-3 rounded-xl outline-none focus:border-green-500" placeholder="admin@email.com">
      </div>

      <button id="btn-request-auth" class="w-full py-3 bg-green-600 hover:bg-green-700 transition text-white rounded-xl font-bold mb-3">인증번호 발송</button>
      
      <div id="auth-input-group" class="hidden">
        <input type="text" id="2fa-code" class="w-full border-2 border-gray-100 p-3 rounded-xl text-center text-2xl tracking-widest mb-3 focus:border-green-500 outline-none" placeholder="000000" maxlength="6">
        <button id="btn-verify-auth" class="w-full py-3 bg-gray-800 hover:bg-black transition text-white rounded-xl font-bold">인증 확인</button>
      </div>
      <a href="/" class="block mt-4 text-sm text-gray-400 underline">홈으로 돌아가기</a>
    </div>
  </div>

  <div id="main-content" class="max-w-7xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col h-[90vh] hidden">
    <header class="p-6 border-b bg-gray-50 flex justify-between items-center shrink-0">
      <h1 class="text-2xl font-black text-gray-800">📷 점심체크 스캐너</h1>
      <a href="/admin_list" class="bg-gray-800 text-white text-xs font-bold py-2 px-3 rounded-lg shadow">👥 명단 관리</a>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4 relative">
      <div class="relative w-full max-w-sm bg-black rounded-3xl overflow-hidden shadow-2xl aspect-square mb-6 border-8 border-gray-800">
        <button id="custom-flip-btn" class="absolute top-4 left-4 z-[60] bg-white/80 text-gray-800 px-3 py-2 rounded-xl shadow-md text-sm font-bold active:scale-95 transition-transform hover:bg-white">
          🔄 전면/후면
        </button>

        <div id="reader"></div>
        
        <div class="absolute inset-0 border-[12px] border-black/30 pointer-events-none"></div>
        <div class="absolute top-1/2 left-0 w-full h-1 bg-green-500/50 shadow-[0_0_15px_green] animate-pulse"></div>
      </div>

      <div id="scan-result" class="w-full max-w-sm bg-white p-6 rounded-3xl shadow-lg text-center hidden border-b-8 border-green-500">
        <div id="result-icon" class="text-6xl mb-2">🍱</div>
        <h2 id="result-name" class="text-2xl font-black text-gray-900 mb-1">성공</h2>
        <p id="result-dept" class="text-gray-500 text-sm font-bold mb-4"></p>
        <p id="result-msg" class="text-lg font-bold text-green-600"></p>
      </div>
    </main>
  </div>

  <script type="module">
    import { API_BASE_URL } from './JS/config.js';
    import CameraManager from './JS/camera.js';
    
    // 세션 스토리지에서 인증 상태 확인
    if(sessionStorage.getItem('scannerAuthVerified') === 'true') {
      document.getElementById('auth-overlay').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');
      window.startScanner(); // 스캐너 자동 시작
    }

    // 🔒 보안 인증 로직
    document.getElementById('btn-request-auth').onclick = async () => {
      const email = document.getElementById('admin-email').value.trim();
      if(!email) return alert('이메일을 입력하세요.');
      const res = await fetch(`${API_BASE_URL}/admin/request-code`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email })
      });
      if(res.ok) {
        document.getElementById('btn-request-auth').classList.add('hidden');
        document.getElementById('auth-input-group').classList.remove('hidden');
        document.getElementById('admin-email').disabled = true;
        alert('인증 메일이 발송되었습니다.');
      } else alert((await res.json()).message);
    };

    document.getElementById('btn-verify-auth').onclick = async () => {
      const email = document.getElementById('admin-email').value;
      const code = document.getElementById('2fa-code').value;
      const res = await fetch(`${API_BASE_URL}/admin/verify-code`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, code })
      });
      if(res.ok) {
        sessionStorage.setItem('scannerAuthVerified', 'true');
        document.getElementById('auth-overlay').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        window.startScanner(); // 인증 성공 시 스캐너 시작
      } else alert('인증번호가 틀렸습니다.');
    };

    // 📷 카메라 전환 버튼 이벤트
    document.getElementById('custom-flip-btn').addEventListener('click', () => {
      CameraManager.toggleCamera();
    });
  </script>
</body>
</html>
