<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>명단 관리 : 화성오산교육청</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 lg:p-6">
  <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col h-[90vh]">
    <header class="p-6 border-b bg-gray-50 flex justify-between items-center shrink-0">
      <div>
        <h1 class="text-2xl font-black text-gray-800">👥 명단 관리 시스템</h1>
        <p class="text-sm text-gray-500">부서명/이름으로 검색하거나 탭을 전환하세요.</p>
      </div>
      <a href="/admin.html" class="bg-white border px-4 py-2 rounded-xl shadow-sm font-bold text-sm hover:bg-gray-50">⬅️ 스캐너로 돌아가기</a>
    </header>

    <div class="p-4 border-b bg-white flex flex-col md:flex-row gap-4 items-center shrink-0">
      <div class="relative w-full md:w-64">
        <input type="text" id="search-input" class="w-full border-2 border-blue-100 p-2.5 pl-10 rounded-xl focus:border-blue-400 outline-none transition-all" placeholder="부서 또는 이름 검색...">
        <span class="absolute left-3 top-3">🔍</span>
      </div>
      <div class="flex-1 flex gap-2 w-full">
        <input type="text" id="new-org" class="flex-1 border p-2.5 rounded-xl text-sm" placeholder="부서">
        <input type="text" id="new-name" class="flex-1 border p-2.5 rounded-xl text-sm" placeholder="이름">
        <select id="new-type" class="border p-2.5 rounded-xl font-bold text-sm">
          <option value="daily">일식</option>
          <option value="monthly">월식</option>
        </select>
        <button id="btn-add-user" class="bg-green-600 text-white px-4 rounded-xl font-bold text-sm shrink-0">추가</button>
      </div>
    </div>

    <div class="flex border-b bg-gray-50 shrink-0">
      <button onclick="switchTab('daily')" id="tab-daily" class="flex-1 py-4 font-black text-blue-600 border-b-4 border-blue-600 bg-white">일식 명단 (Daily)</button>
      <button onclick="switchTab('monthly')" id="tab-monthly" class="flex-1 py-4 font-bold text-gray-500 hover:bg-gray-100">월식 명단 (Monthly)</button>
    </div>

    <div class="px-6 py-3 bg-gray-50 border-b flex justify-between items-center shrink-0">
      <div class="flex gap-4 items-center">
        <input type="checkbox" id="check-all" class="w-5 h-5">
        <span class="text-sm font-bold text-gray-600">전체 선택</span>
      </div>
      <div class="flex gap-2">
        <button onclick="bulkExtend()" id="extend-label" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md">선택 연장</button>
        <button onclick="bulkDelete()" class="bg-red-500 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md">선택 삭제</button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto">
      <table class="w-full">
        <thead class="bg-gray-100 sticky top-0 z-10">
          <tr class="text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
            <th class="p-4 w-12"></th>
            <th class="p-4">소속 부서</th>
            <th class="p-4">성함</th>
            <th class="p-4 text-center">마감 기한</th>
            <th class="p-4 text-right">관리</th>
          </tr>
        </thead>
        <tbody id="user-list-body" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { API_BASE_URL } from './JS/config.js';

    let currentTab = 'daily';
    let allUsers = [];

    async function loadUsers() {
      const res = await fetch(`${API_BASE_URL}/admin/allowed-users`);
      allUsers = await res.json();
      renderUsers();
    }

    function renderUsers() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const tbody = document.getElementById('user-list-body');
      
      // 1. 탭 필터 + 검색 필터
      let filtered = allUsers.filter(u => u.mealType === currentTab);
      if (searchTerm) {
        filtered = filtered.filter(u => u.orgRole.toLowerCase().includes(searchTerm) || u.name.toLowerCase().includes(searchTerm));
      }

      // 2. 정렬 (부서 -> 이름)
      filtered.sort((a, b) => a.orgRole !== b.orgRole ? a.orgRole.localeCompare(b.orgRole, 'ko') : a.name.localeCompare(b.name, 'ko'));

      tbody.innerHTML = filtered.map((u) => {
        // 실제 인덱스를 찾기 위해 오리지널 배열에서의 인덱스 사용
        const originalIdx = allUsers.findIndex(orig => orig.createdAt === u.createdAt);
        const isExpired = new Date(u.endDate + "T23:59:59") < new Date();
        
        return `
        <tr class="hover:bg-blue-50 transition-colors ${isExpired ? 'bg-red-50' : ''}">
          <td class="p-4"><input type="checkbox" class="user-check w-5 h-5" data-index="${originalIdx}"></td>
          <td class="p-4 text-sm text-gray-600">${u.orgRole}</td>
          <td class="p-4 font-black text-gray-900">${u.name}</td>
          <td class="p-4 text-center font-mono text-sm ${isExpired ? 'text-red-600 font-bold' : 'text-blue-600'}">
            ${u.endDate} ${isExpired ? '⚠️' : '✅'}
          </td>
          <td class="p-4 text-right">
            <button onclick="extendUser(${originalIdx})" class="text-xs font-bold bg-white border border-blue-500 text-blue-600 px-3 py-1.5 rounded-lg hover:bg-blue-500 hover:text-white transition-all">기간 연장</button>
            <button onclick="deleteUser(${originalIdx})" class="ml-2 text-xs font-bold text-red-400 hover:text-red-600">삭제</button>
          </td>
        </tr>`;
      }).join('');

      // 버튼 문구 변경
      document.getElementById('extend-label').textContent = currentTab === 'daily' ? '선택 1일 연장' : '선택 다음달 연장';
    }

    window.switchTab = (tab) => {
      currentTab = tab;
      document.getElementById('tab-daily').className = tab === 'daily' ? 'flex-1 py-4 font-black text-blue-600 border-b-4 border-blue-600 bg-white' : 'flex-1 py-4 font-bold text-gray-500 hover:bg-gray-100';
      document.getElementById('tab-monthly').className = tab === 'monthly' ? 'flex-1 py-4 font-black text-indigo-600 border-b-4 border-indigo-600 bg-white' : 'flex-1 py-4 font-bold text-gray-500 hover:bg-gray-100';
      renderUsers();
    };

    document.getElementById('search-input').oninput = renderUsers;

    // 추가/연장/삭제 로직 (기존과 동일하되 인덱스 처리 주의)
    document.getElementById('btn-add-user').onclick = async () => {
      const orgRole = document.getElementById('new-org').value.trim();
      const name = document.getElementById('new-name').value.trim();
      const mealType = document.getElementById('new-type').value;
      if(!orgRole || !name) return alert('정보를 입력하세요.');
      const res = await fetch(`${API_BASE_URL}/admin/allowed-users`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ orgRole, name, mealType })
      });
      if(res.ok) { loadUsers(); document.getElementById('new-name').value = ""; }
    };

    window.extendUser = async (idx) => {
      await fetch(`${API_BASE_URL}/admin/allowed-users/extend`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ indexes: [idx], type: currentTab })
      });
      loadUsers();
    };

    window.bulkExtend = async () => {
      const indexes = Array.from(document.querySelectorAll('.user-check:checked')).map(cb => parseInt(cb.dataset.index));
      if(indexes.length === 0) return alert('연장할 대상을 선택하세요.');
      await fetch(`${API_BASE_URL}/admin/allowed-users/extend`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ indexes, type: currentTab })
      });
      loadUsers();
    };

    window.deleteUser = async (idx) => {
      if(!confirm('삭제하시겠습니까?')) return;
      await fetch(`${API_BASE_URL}/admin/allowed-users`, { 
        method: 'DELETE', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ indexes: [idx] }) 
      });
      loadUsers();
    };

    window.bulkDelete = async () => {
      const indexes = Array.from(document.querySelectorAll('.user-check:checked')).map(cb => parseInt(cb.dataset.index));
      if(indexes.length === 0) return alert('삭제할 대상을 선택하세요.');
      if(!confirm('일괄 삭제하시겠습니까?')) return;
      await fetch(`${API_BASE_URL}/admin/allowed-users`, { 
        method: 'DELETE', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ indexes }) 
      });
      loadUsers();
    };

    document.getElementById('check-all').onchange = (e) => {
      document.querySelectorAll('.user-check').forEach(cb => cb.checked = e.target.checked);
    };

    loadUsers();
  </script>
</body>
</html>
