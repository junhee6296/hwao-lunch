<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>화성오산교육청 : 점심체크 QR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="stylesheet" href="CSS/style.css">
  <style>
    :root { --primary-color: #059669; } /* 점심체크용 초록색 테마 */
    .btn-primary { background-color: var(--primary-color) !important; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto min-h-screen flex flex-col bg-white shadow-xl">
    <header class="py-10 px-4 border-b-2 border-green-100 text-center">
      <h1 class="text-4xl font-extrabold text-gray-900">🍽️ 점심 체크 전용 QR</h1>
      <p class="text-xl text-gray-500 mt-2">부서와 이름을 입력하고 QR을 보여주세요</p>
      
      <a href="/admin.html" class="absolute top-6 right-6 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-2 px-4 rounded-xl transition-all shadow-sm text-sm flex items-center gap-2">
        ⚙️ 관리자 스캐너
      </a>
    </header>

    <main class="flex-1 p-6 flex flex-col items-center justify-center">
      <div id="qr-form-container" class="w-full max-w-md p-8 rounded-3xl border-2 border-gray-100 shadow-sm bg-white">
        <div class="input-row">
          <label for="orgRole" class="input-label">소속 부서</label>
          <input type="text" id="orgRole" class="form-input" placeholder="예: 행정과, 초등교육지원과">
        </div>
        
        <div class="input-row">
          <label for="userName" class="input-label">이름</label>
          <input type="text" id="userName" class="form-input" placeholder="성함을 입력하세요">
        </div>
        
        <button id="btn-generate-qr" class="btn btn-primary w-full mt-6 text-2xl h-20 rounded-2xl font-bold shadow-lg shadow-green-100">
          오늘의 점심 QR 생성
        </button>

        <button id="pwa-install-btn" class="hidden mt-8 w-full py-4 bg-gray-100 text-gray-600 font-bold rounded-xl flex items-center justify-center gap-2 border border-gray-200">
          📱 스마트폰 바탕화면에 추가하기
        </button>
      </div>

      <div id="qrcode-container" class="hidden w-full max-w-md text-center">
        <div id="qrcode" class="flex justify-center p-6 bg-white border-4 border-green-500 rounded-3xl shadow-2xl mb-6"></div>
        <h2 id="qr-result-name" class="text-3xl font-black text-gray-900 mb-2"></h2>
        <p class="text-gray-500 text-lg mb-8">이 QR은 <span id="timer" class="text-red-500 font-bold">03:00</span> 동안 유효합니다.</p>
        
        <button id="btn-reissue-qr" class="btn btn-primary w-full h-16 rounded-xl font-bold">QR 다시 발급받기</button>
      </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-sm">
      © 화성오산교육청 점심체크 시스템
    </footer>
  </div>

  <script type="module" src="JS/qr_app.js"></script>
</body>
</html>
