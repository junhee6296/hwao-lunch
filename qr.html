<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>화성오산교육청 : 점심체크 QR</title>
  
  <link rel="manifest" href="/manifest.json">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="stylesheet" href="CSS/style.css">
  
  <style>
    :root { --primary-color: #059669; }
    .btn-primary { background-color: var(--primary-color) !important; color: white !important; }
    
    /* 화면 겹침 완벽 차단 */
    .hidden { display: none !important; } 
    
    /* 바로가기 버튼 전용 안전 스타일 (디자인 스크립트가 죽어도 모양 유지) */
    .btn-pwa {
      margin-top: 16px;
      width: 100%;
      height: 60px;
      background-color: #eff6ff;
      color: #2563eb;
      font-weight: 700;
      font-size: 16px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid #dbeafe;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      cursor: pointer;
    }
    .btn-pwa:active { transform: scale(0.95); }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto min-h-screen flex flex-col bg-white shadow-xl">
    
    <div class="flex justify-end pt-4 px-4 bg-white">
      <a href="/admin.html" class="bg-gray-100 hover:bg-gray-200 text-gray-500 font-bold py-1.5 px-3 rounded-lg text-xs flex items-center gap-1 shadow-sm transition-colors">
        ⚙️ 관리자 스캐너
      </a>
    </div>

    <header class="pb-8 pt-2 px-4 border-b-2 border-green-100 text-center">
      <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-900 leading-tight">🍽️ 점심 체크 전용 QR</h1>
      <p class="text-lg sm:text-xl text-gray-500 mt-2 break-keep">부서와 이름을 입력하고 QR을 보여주세요</p>
    </header>

    <main class="flex-1 p-6 flex flex-col items-center justify-center">
      <div id="qr-form-container" class="w-full max-w-md p-8 rounded-3xl border-2 border-gray-100 shadow-sm bg-white">
        <div class="input-row">
          <label for="orgRole" class="input-label">소속 부서</label>
          <input type="text" id="orgRole" class="form-input" placeholder="예: 행정과, 초등교육지원과">
        </div>
        
        <div class="input-row">
          <label for="userName" class="input-label">이름</label>
          <input type="text" id="userName" class="form-input" placeholder="성함을 입력하세요">
        </div>
        
        <button id="btn-generate-qr" class="btn btn-primary w-full mt-6 text-2xl h-20 rounded-2xl font-bold shadow-lg shadow-green-100">
          오늘의 점심 QR 생성
        </button>

        <button id="btn-add-shortcut" type="button" class="btn-pwa transition-transform">
          📱 스마트폰 홈 화면에 바로가기 추가
        </button>
      </div>

      <div id="qrcode-container" class="hidden w-full max-w-md text-center">
        <div id="qrcode" class="flex justify-center p-6 bg-white border-4 border-green-500 rounded-3xl shadow-2xl mb-6"></div>
        <h2 id="qr-result-name" class="text-3xl font-black text-gray-900 mb-2"></h2>
        <p class="text-gray-500 text-lg mb-8">이 QR은 <span id="timer" class="text-red-500 font-bold">03:00</span> 동안 유효합니다.</p>
        
        <button id="btn-reissue-qr" class="btn btn-primary w-full h-16 rounded-xl font-bold">QR 다시 발급받기</button>
      </div>
    </main>
      <div id="ios-install-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
            <div class="bg-white rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
              <div class="text-4xl mb-2">🍎</div>
              <h3 class="text-xl font-extrabold text-gray-900 mb-2">아이폰 앱 설치 방법</h3>
              <p class="text-gray-500 text-sm mb-6">애플 정책상 아이폰은 아래 방법으로만<br>바탕화면 추가가 가능합니다.</p>
              
              <div class="bg-gray-50 rounded-2xl p-5 mb-6 text-left text-sm text-gray-700 leading-relaxed border border-gray-100">
                <p class="mb-3">1. 화면 하단 (혹은 웹 주소창 옆에 있는 경우도 있음)의 <b class="text-blue-600">[공유]</b> 아이콘(네모에 위로 화살표 ⬆️)을 누릅니다.</p>
                <p>2. 메뉴를 조금 위로 올려서 <b class="text-blue-600">[홈 화면에 추가]</b> ➕ 를 선택합니다.</p>
              </div>
              
              <button id="btn-close-ios-modal" class="btn btn-primary w-full h-14 rounded-2xl font-bold text-lg shadow-md shadow-green-100">
                확인했습니다
              </button>
            </div>
          </div>

    <footer class="py-6 text-center text-gray-400 text-sm">
      © 화성오산교육지원청 기획경영과 2026. All rights reserved.
    </footer>
  </div>

  <script type="module" src="JS/qr_app.js"></script>
</body>
</html>
